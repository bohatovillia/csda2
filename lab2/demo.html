<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота 2 — Dashboard (Demo)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f4f4f9;
            color: #333;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border-top: 5px solid #4a90e2;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 13px;
            color: #95a5a6;
            margin-bottom: 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #7f8c8d;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .info-row:last-of-type {
            border-bottom: none;
            margin-bottom: 24px;
        }

        /* Індикатор LED */
        .led {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 8px;
            background-color: #bdc3c7;
            border: 4px solid #95a5a6;
            transition: background-color 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        .led.on {
            background-color: #2ecc71;
            border-color: #27ae60;
            box-shadow: 0 0 24px rgba(46, 204, 113, 0.5);
        }

        .led-label {
            font-size: 14px;
            font-weight: 600;
            color: #7f8c8d;
            margin-bottom: 24px;
        }

        /* Кнопки */
        .buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn {
            flex: 1;
            padding: 14px 0;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
            color: #fff;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-on {
            background-color: #27ae60;
        }

        .btn-off {
            background-color: #e74c3c;
        }

        /* Лог */
        .log-title {
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #95a5a6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .log {
            background-color: #1e1e2e;
            border-radius: 8px;
            padding: 14px;
            font-family: "Consolas", "Courier New", monospace;
            font-size: 12px;
            color: #a6e3a1;
            text-align: left;
            max-height: 160px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .log p {
            margin: 0;
            white-space: nowrap;
        }

        .log .log-info {
            color: #89b4fa;
        }

        .log .log-ok {
            color: #a6e3a1;
        }

        .log .log-warn {
            color: #f9e2af;
        }

        .log .log-err {
            color: #f38ba8;
        }

        .log .log-time {
            color: #6c7086;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>CSDA2 — Лаб 2</h1>
        <p class="subtitle">Богатов Ілля Сергійович · КІ-408 · Варіант 1</p>

        <div class="info-row">
            <span>Пристрій</span>
            <span>CY8CKIT-062-WIFI-BT</span>
        </div>
        <div class="info-row">
            <span>API</span>
            <span>/api/status · /api/control</span>
        </div>

        <div class="led" id="ledIndicator"></div>
        <div class="led-label" id="ledLabel">LED: OFF</div>

        <div class="buttons">
            <button class="btn btn-on" onclick="sendCommand('on')">ON</button>
            <button class="btn btn-off" onclick="sendCommand('off')">OFF</button>
        </div>

        <div class="log-title">Системний лог</div>
        <div class="log" id="log"></div>
    </div>

    <script>
        /* ---- Стан ---- */
        let ledState = false;

        /* ---- DOM ---- */
        const ledEl    = document.getElementById('ledIndicator');
        const labelEl  = document.getElementById('ledLabel');
        const logEl    = document.getElementById('log');

        /* ---- Лог ---- */
        function log(msg, type) {
            const now  = new Date();
            const time = now.toLocaleTimeString('uk-UA', { hour12: false });
            const p    = document.createElement('p');

            const cls = {
                info: 'log-info',
                ok:   'log-ok',
                warn: 'log-warn',
                err:  'log-err'
            }[type] || 'log-ok';

            p.innerHTML = '<span class="log-time">[' + time + ']</span> <span class="' + cls + '">' + msg + '</span>';
            logEl.prepend(p);

            while (logEl.children.length > 30) {
                logEl.removeChild(logEl.lastChild);
            }
        }

        /* ---- UI ---- */
        function updateUI() {
            if (ledState) {
                ledEl.classList.add('on');
                labelEl.textContent = 'LED: ON';
            } else {
                ledEl.classList.remove('on');
                labelEl.textContent = 'LED: OFF';
            }
        }

        /* ---- Демо-імітація fetch GET /api/status ---- */
        async function fetchStatus() {
            log('GET /api/status', 'info');

            // Імітація затримки мережі
            await new Promise(r => setTimeout(r, 150));

            const body = { led_on: ledState };
            log('← 200 OK ' + JSON.stringify(body), 'ok');
            updateUI();
        }

        /* ---- Демо-імітація fetch POST /api/control ---- */
        async function sendCommand(cmd) {
            const payload = { command: cmd };
            log('POST /api/control  →  ' + JSON.stringify(payload), 'info');

            // Імітація затримки мережі
            await new Promise(r => setTimeout(r, 200));

            // Логіка зміни стану
            if (cmd === 'on')      ledState = true;
            else if (cmd === 'off') ledState = false;
            else if (cmd === 'toggle') ledState = !ledState;

            log('← 200 OK {"result":"ok"}', 'ok');
            log('LED → ' + (ledState ? 'ON' : 'OFF'), ledState ? 'ok' : 'warn');

            updateUI();
        }

        /* ---- Polling кожні 5 секунд ---- */
        setInterval(fetchStatus, 5000);

        /* ---- Стартова ініціалізація ---- */
        log('Система ініціалізована', 'info');
        log('Wi-Fi підключено: 192.168.1.100', 'ok');
        log('LittleFS змонтовано', 'ok');
        log('HTTP-сервер запущено на порті 80', 'ok');
        log('Polling /api/status кожні 5 сек.', 'info');
        fetchStatus();
    </script>
</body>

</html>
