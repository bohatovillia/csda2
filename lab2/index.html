<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота 2 — Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f4f4f9;
            color: #333;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border-top: 5px solid #4a90e2;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 13px;
            color: #95a5a6;
            margin-bottom: 30px;
        }

        /* Індикатор-лампочка */
        .led-container {
            margin: 0 auto 30px;
        }

        .led {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto;
            background-color: #bdc3c7;
            border: 4px solid #95a5a6;
            transition: background-color 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        .led.on {
            background-color: #2ecc71;
            border-color: #27ae60;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
        }

        .led-label {
            margin-top: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #7f8c8d;
        }

        /* Кнопки */
        .buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn {
            flex: 1;
            padding: 14px 0;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
            color: #fff;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-on {
            background-color: #27ae60;
        }

        .btn-off {
            background-color: #e74c3c;
        }

        /* Лог */
        .log {
            background-color: #f8f9fa;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            color: #7f8c8d;
            text-align: left;
            max-height: 120px;
            overflow-y: auto;
        }

        .log p {
            margin-bottom: 4px;
        }

        .log p:last-child {
            margin-bottom: 0;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #7f8c8d;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .info-row:last-child {
            border-bottom: none;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>CSDA2 — Лаб 2</h1>
        <p class="subtitle">Богатов Ілля Сергійович · КІ-408 · Варіант 1</p>

        <div class="info-row">
            <span>Пристрій</span>
            <span>CY8CKIT-062-WIFI-BT</span>
        </div>
        <div class="info-row">
            <span>Ендпоінти</span>
            <span>/api/status · /api/control</span>
        </div>

        <!-- Індикатор стану LED -->
        <div class="led-container">
            <div class="led" id="ledIndicator"></div>
            <div class="led-label" id="ledLabel">OFF</div>
        </div>

        <!-- Кнопки керування -->
        <div class="buttons">
            <button class="btn btn-on" id="btnOn" onclick="setLED(true)">ON</button>
            <button class="btn btn-off" id="btnOff" onclick="setLED(false)">OFF</button>
        </div>

        <!-- Лог подій -->
        <div class="log" id="log">
            <p>Система готова.</p>
        </div>
    </div>

    <script>
        const ledIndicator = document.getElementById('ledIndicator');
        const ledLabel = document.getElementById('ledLabel');
        const logEl = document.getElementById('log');

        let ledState = false;

        function log(msg) {
            const time = new Date().toLocaleTimeString();
            const p = document.createElement('p');
            p.textContent = `[${time}] ${msg}`;
            logEl.prepend(p);
            // Обмеження кількості записів у лозі
            while (logEl.children.length > 20) {
                logEl.removeChild(logEl.lastChild);
            }
        }

        function updateUI() {
            if (ledState) {
                ledIndicator.classList.add('on');
                ledLabel.textContent = 'ON';
            } else {
                ledIndicator.classList.remove('on');
                ledLabel.textContent = 'OFF';
            }
        }

        // GET /api/status — отримання поточного стану
        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json(); // {"led_on": true/false}
                ledState = data.led_on;
                updateUI();
            } catch (error) {
                log('Помилка отримання статусу: ' + error.message);
            }
        }

        // POST /api/control — надсилання команди
        async function setLED(turnOn) {
            const command = turnOn ? 'on' : 'off';
            log(`Надсилання команди: ${command}...`);
            try {
                const response = await fetch('/api/control', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: command })
                });
                const data = await response.json(); // {"result": "ok"}
                log(`Відповідь: ${JSON.stringify(data)}`);
                // Оновити стан після команди
                await fetchStatus();
            } catch (error) {
                log('Помилка запиту: ' + error.message);
                // Демо-режим (без реального контролера)
                ledState = turnOn;
                updateUI();
                log('(Демо) Стан LED змінено на: ' + (turnOn ? 'ON' : 'OFF'));
            }
        }

        // Автоматичне оновлення стану кожні 5 секунд (polling)
        setInterval(fetchStatus, 5000);

        // Перший запит при завантаженні сторінки
        fetchStatus();
    </script>
</body>

</html>
