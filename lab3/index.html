<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота 3 — MPU-6050 WebSocket</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f4f4f9;
            color: #333;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 32px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border-top: 5px solid #4a90e2;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 22px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #95a5a6;
            margin-bottom: 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #7f8c8d;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .info-row:last-of-type {
            border-bottom: none;
            margin-bottom: 16px;
        }

        /* Живі значення */
        .values {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .val-box {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            border-radius: 8px;
            background: #f8f9fa;
            border: 1px solid #eee;
        }

        .val-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .val-label.x { color: #e74c3c; }
        .val-label.y { color: #2ecc71; }
        .val-label.z { color: #3498db; }

        .val-num {
            font-size: 20px;
            font-weight: 600;
            color: #2c3e50;
        }

        /* Графік */
        .chart-wrap {
            position: relative;
            height: 280px;
            margin-bottom: 20px;
        }

        /* Статус */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #95a5a6;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-dot.connected { background: #2ecc71; }
        .status-dot.disconnected { background: #e74c3c; }
    </style>
</head>

<body>
    <div class="card">
        <h1>CSDA2 — Лаб 3</h1>
        <p class="subtitle">Богатов Ілля Сергійович · КІ-408 · Варіант 1</p>

        <div class="info-row">
            <span>Сенсор</span>
            <span>MPU-6050 (Акселерометр)</span>
        </div>
        <div class="info-row">
            <span>Протокол</span>
            <span>WebSocket (ws://…:81)</span>
        </div>

        <!-- Живі значення X Y Z -->
        <div class="values">
            <div class="val-box">
                <div class="val-label x">X</div>
                <div class="val-num" id="valX">0.00</div>
            </div>
            <div class="val-box">
                <div class="val-label y">Y</div>
                <div class="val-num" id="valY">0.00</div>
            </div>
            <div class="val-box">
                <div class="val-label z">Z</div>
                <div class="val-num" id="valZ">0.00</div>
            </div>
        </div>

        <!-- Графік -->
        <div class="chart-wrap">
            <canvas id="myChart"></canvas>
        </div>

        <!-- Статус-бар -->
        <div class="status-bar">
            <span><span class="status-dot disconnected" id="statusDot"></span><span id="statusText">Відключено</span></span>
            <span id="pktCount">Пакетів: 0</span>
        </div>
    </div>

    <script>
        /* ---- Стан ---- */
        const MAX_POINTS = 30;
        let packetCount = 0;

        /* ---- DOM ---- */
        const valX = document.getElementById('valX');
        const valY = document.getElementById('valY');
        const valZ = document.getElementById('valZ');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const pktCount = document.getElementById('pktCount');

        /* ---- Chart.js ---- */
        const ctx = document.getElementById('myChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'X (g)',
                        data: [],
                        borderColor: '#e74c3c',
                        backgroundColor: 'rgba(231,76,60,0.1)',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.3,
                        fill: false
                    },
                    {
                        label: 'Y (g)',
                        data: [],
                        borderColor: '#2ecc71',
                        backgroundColor: 'rgba(46,204,113,0.1)',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.3,
                        fill: false
                    },
                    {
                        label: 'Z (g)',
                        data: [],
                        borderColor: '#3498db',
                        backgroundColor: 'rgba(52,152,219,0.1)',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.3,
                        fill: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                scales: {
                    x: {
                        ticks: { font: { size: 10 }, color: '#95a5a6', maxTicksLimit: 8 },
                        grid: { color: '#f0f0f0' }
                    },
                    y: {
                        title: { display: true, text: 'g', color: '#95a5a6', font: { size: 12 } },
                        ticks: { font: { size: 10 }, color: '#95a5a6' },
                        grid: { color: '#f0f0f0' },
                        suggestedMin: -2,
                        suggestedMax: 2
                    }
                },
                plugins: {
                    legend: { labels: { font: { size: 12 }, usePointStyle: true, pointStyle: 'line' } }
                }
            }
        });

        /* ---- Додати точку ---- */
        function addDataPoint(x, y, z) {
            const time = new Date().toLocaleTimeString('uk-UA', { hour12: false });

            chart.data.labels.push(time);
            chart.data.datasets[0].data.push(x);
            chart.data.datasets[1].data.push(y);
            chart.data.datasets[2].data.push(z);

            // Rolling window
            if (chart.data.labels.length > MAX_POINTS) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
                chart.data.datasets[1].data.shift();
                chart.data.datasets[2].data.shift();
            }

            chart.update('none');

            valX.textContent = x.toFixed(2);
            valY.textContent = y.toFixed(2);
            valZ.textContent = z.toFixed(2);

            packetCount++;
            pktCount.textContent = 'Пакетів: ' + packetCount;
        }

        /* ---- WebSocket ---- */
        function connectWS() {
            const url = 'ws://' + location.hostname + ':81';
            const socket = new WebSocket(url);

            socket.onopen = function () {
                statusDot.classList.remove('disconnected');
                statusDot.classList.add('connected');
                statusText.textContent = 'Підключено';
            };

            socket.onmessage = function (event) {
                const data = JSON.parse(event.data);
                addDataPoint(data.x, data.y, data.z);
            };

            socket.onclose = function () {
                statusDot.classList.remove('connected');
                statusDot.classList.add('disconnected');
                statusText.textContent = 'Відключено (перепідключення...)';
                setTimeout(connectWS, 3000);
            };

            socket.onerror = function () {
                socket.close();
            };
        }

        connectWS();
    </script>
</body>

</html>
